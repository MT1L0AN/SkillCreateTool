appId: com.skillcreator.tool
productName: Skill Creator Tool
copyright: Copyright © 2026

directories:
  output: release
  buildResources: build

files:
  - "**/*"
  - "!release/**"
  - "!.workbuddy/**"
  - "!.git/**"
  - "!*.md"
  - "!src/**"
  - "!build/**"

asar: false

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  icon: build/icon.icns
  darkModeSupport: true

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Skill Creator Tool

dmg:
  title: Skill Creator Tool
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
